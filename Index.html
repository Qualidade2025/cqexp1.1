<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CQ Expedição - MVP</title>
    <?!= include('styles') ?>
  </head>
  <body>
    <section id="appSplash" class="app-splash" aria-label="Splash screen">
      <div id="appSplashLogoWrap" class="app-splash-logo-wrap" role="img" aria-label="Logo Baldi">
        <img
          id="appSplashLogoDark"
          class="app-splash-logo app-splash-logo-dark"
          alt="Baldi branca"
          src="https://i.ibb.co/933KM0KH/Logo-Baldi-Vers-o-Correta-Branca.png"
        />
        <img
          id="appSplashLogoLight"
          class="app-splash-logo app-splash-logo-light"
          alt="Baldi preta"
          src="https://i.ibb.co/PzDD4QLk/Logo-Baldi-Vers-o-Correta-Preta.png"
        />
        <div id="appSplashLogoMask" class="app-splash-logo-mask" aria-hidden="true"></div>
      </div>
    </section>
    <main class="container">
      <div id="startupLoading" class="startup-loading" role="status" aria-live="polite">
        <div class="startup-loading-card">
          <span class="loading-spinner" aria-hidden="true"></span>
          <p>Carregando cache e listas...</p>
        </div>
      </div>

      <section class="brand-header" aria-label="Identidade visual Baldi">
        <div class="logo-wrap home-logo">
          <img src="https://i.ibb.co/PzDD4QLk/Logo-Baldi-Vers-o-Correta-Preta.png" alt="Logo Baldi" class="logo-img logo-light home-light-logo">
          <img class="logo-img logo-dark home-dark-logo" src="https://i.ibb.co/933KM0KH/Logo-Baldi-Vers-o-Correta-Branca.png" alt="Logo Baldi (modo escuro)">
        </div>
      </section>
      <section class="top-actions">
        <span class="button-with-status">
          <button id="listRncsBtn" class="secondary" type="button">Listar Controles</button>
          <span id="listRncsStatus" class="hint inline-status" aria-live="polite"></span>
        </span>
        <button id="editOperatorsBtn" class="secondary" type="button">Colaboradores</button>
        <button class="secondary theme-toggle" type="button" data-theme-toggle aria-label="Alternar tema">🌙</button>
      </section>

      <div id="selectedOperators" class="selected-operators">Nenhum operador selecionado.</div>

      <section class="card">
        <div class="section-header">
          <h2>Identificação</h2>
        </div>
        <section class="form-grid">
          <label>
            OP *
            <div class="op-input-wrap">
              <input id="op" type="text" maxlength="50" inputmode="numeric" pattern="[0-9]*" placeholder="Ex.: 12345" />
              <button id="opLockBtn" class="op-lock-btn" type="button" aria-label="Travar campo OP">✕</button>
            </div>
          </label>

          <label>
            Qtdd Revisada *
            <input id="qtddRevisada" type="number" min="1" step="1" />
          </label>

          <label>
            <span id="origemLabel">Origem</span>
            <select id="origem"></select>
          </label>

          <label>
            <span id="clienteLabel">Cliente</span>
            <input id="clienteManual" type="text" maxlength="120" placeholder="Ex.: Cliente XYZ" />
          </label>

          <label class="checkbox-row">
            <input id="retrabalho" type="checkbox" />
            Retrabalho
          </label>
        </section>
      </section>

      <section class="card">
        <div class="defect-header">
          <h2>Defeitos</h2>
          <button id="addDefectBtn" class="secondary" type="button">+ Adicionar lançamento</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Posição *</th>
                <th>Defeito *</th>
                <th>Quantidade *</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="defectRows"></tbody>
          </table>
        </div>
      </section>

      <section class="actions">
        <button id="saveBtn" type="button">Salvar</button>
        <button id="clearBtn" class="secondary" type="button">Limpar</button>
      </section>

      <section id="messageBox" class="message" aria-live="polite"></section>
    </main>

    <div id="operatorModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="operatorModalTitle">
      <section class="modal-card">
        <div class="modal-header">
          <h3 id="operatorModalTitle">Selecionar operadores</h3>
          <button id="closeOperatorsBtn" class="icon-btn" type="button" aria-label="Fechar modal">×</button>
        </div>
        <p class="hint">Escolha até 8 operadores. É obrigatório selecionar pelo menos 1.</p>
        <div id="operatorSelectors" class="operator-selectors"></div>
        <p id="operatorModalError" class="message error"></p>
        <div class="modal-actions">
          <button id="editCollaboratorsBtn" class="secondary" type="button">Editar</button>
          <button id="clearOperatorsModalBtn" class="secondary" type="button">Limpar</button>
          <button id="confirmOperatorsBtn" type="button">OK</button>
        </div>
      </section>
    </div>

    <div id="passwordModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="passwordModalTitle">
      <section class="modal-card modal-card-sm">
        <div class="modal-header">
          <h3 id="passwordModalTitle">Senha</h3>
          <button id="closePasswordBtn" class="icon-btn" type="button" aria-label="Fechar modal">×</button>
        </div>
        <label class="sr-only" for="collaboratorsPassword">Senha</label>
        <input id="collaboratorsPassword" type="password" autocomplete="current-password" aria-label="Senha" />
        <div class="modal-actions">
          <span id="passwordModalError" class="message error modal-inline-message"></span>
          <button id="confirmPasswordBtn" type="button">OK</button>
        </div>
      </section>
    </div>

    <script>
      window.APP_BASE_URL = <?!= JSON.stringify(appBaseUrl || '') ?>;
      <?!= include('apps') ?>
    </script>
  </body>
</html>
