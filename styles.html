<style>
  :root {
    --bg: #ffffff;
    --text: #111827;
    --surface: #ffffff;
    --surface-muted: #f9fafb;
    --surface-soft: #f3f4f6;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --muted: #6b7280;
    --primary: #111827;
    --primary-contrast: #ffffff;
    --secondary: #6b7280;
    --link: #2563eb;
    --danger: #b91c1c;
    --ok: #059669;
    --shadow: 0 15px 40px rgba(0, 0, 0, 0.18);
    --overlay: rgba(0, 0, 0, 0.45);
    --row-hover: #eef2ff;
  }

  html[data-theme='dark'] {
    color-scheme: dark;
    --bg: #111827;
    --text: #e5e7eb;
    --surface: #111827;
    --surface-muted: #1f2937;
    --surface-soft: #334155;
    --border: #334155;
    --border-strong: #475569;
    --muted: #cbd5e1;
    --primary: #60a5fa;
    --primary-contrast: #f8fafc;
    --secondary: #475569;
    --link: #60a5fa;
    --danger: #fca5a5;
    --ok: #34d399;
    --shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
    --overlay: rgba(2, 6, 23, 0.7);
    --row-hover: #273449;
  }

  html[data-theme='dark'] {
    scrollbar-color: #94a3b8 transparent;
  }

  html[data-theme='dark'] ::-webkit-scrollbar-track {
    background: transparent;
  }

  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
  }

  .container {
    max-width: 1024px;
    margin: 24px auto;
    padding: 0 16px 24px;
    position: relative;
  }

  .startup-loading {
    position: fixed;
    inset: 0;
    background: var(--overlay);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    padding: 16px;
  }

  .startup-loading.hidden {
    display: none;
  }

  .startup-loading-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    font-weight: 600;
  }

  .loading-spinner {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border-strong);
    border-top-color: var(--primary);
    animation: spin 0.85s linear infinite;
  }

  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }

  label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 14px;
  }

  input,
  select,
  button {
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font-size: 14px;
    padding: 10px;
    background: var(--surface);
    color: var(--text);
  }

  button {
    cursor: pointer;
    background: var(--primary);
    color: var(--primary-contrast);
    border-color: var(--primary);
  }

  button.secondary {
    background: var(--surface-soft);
    color: var(--text);
    border-color: var(--border-strong);
  }

  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .top-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    justify-content: flex-end;
    flex-wrap: wrap;
    min-height: 69px;
    align-items: center;
  }


  .button-with-status {
    position: relative;
    display: inline-flex;
    align-items: center;
  }

  .inline-status {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    min-width: 0;
    white-space: nowrap;
  }

  .operator-selectors {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 10px;
  }

  .operator-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .selected-operators {
    margin-bottom: 14px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface-muted);
    font-size: 14px;
  }

  .checkbox-row {
    grid-column: 1 / -1;
    flex-direction: row;
    align-items: center;
    gap: 8px;
  }

  .checkbox-row input[type='checkbox'] {
    width: 16px;
    height: 16px;
    margin: 0;
    padding: 0;
  }

  .operator-slot {
    font-size: 14px;
  }

  .hint {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }

  .defect-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .section-header h2,
  .margin-bottom: 10px;
  .defect-header h2 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
  }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th,
  td {
    border-bottom: 1px solid var(--border);
    padding: 8px;
    text-align: left;
  }

  tbody tr:hover {
    background: var(--row-hover);
  }

  th {
    font-weight: 400;
    font-size: 14px;
  }

  #defectRows .posicao,
  #defectRows .defeito {
    width: 100%;
    min-width: 100px;
  }

  #defectRows .quantidade {
    width: 90px;
    max-width: 100%;
  }

  .row-remove {
    background: transparent;
    color: var(--danger);
    border-color: var(--danger);
    padding: 6px 8px;
  }

  .message {
    min-height: 24px;
    font-weight: 600;
  }

  .message.error {
    color: var(--danger);
  }

  .message.success {
    color: var(--ok);
  }

  .message.info {
    color: var(--muted);
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: var(--overlay);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 10;
  }

  .modal-backdrop.hidden {
    display: none;
  }

  .modal-card {
    width: min(760px, 100%);
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .modal-card-sm {
    width: min(420px, 100%);
  }

  .modal-actions {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }

    .modal-inline-message {
    min-height: 0;
    margin-right: auto;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  .modal-header h3 {
    margin: 0;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    min-width: 34px;
    padding: 0;
    font-size: 22px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    color: var(--text);
    border-color: var(--border);
  }

  .theme-toggle {
    min-width: 42px;
    line-height: 1;
    padding: 8px 10px;
    font-size: 16px;
  }

  .brand-header {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    margin: 0;
    pointer-events: none;
  }

  .logo-wrap.home-logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 69px;
  }

  .logo-img {
    height: 69px;
    width: 157px;
    max-width: 100%;
    object-fit: contain;
  }

  .logo-dark {
    display: none;
  }

  html[data-theme='dark'] .logo-light {
    display: none;
  }

  html[data-theme='dark'] .logo-dark {
    display: inline-block;
  }

  @media (max-width: 820px) {
    .operator-selectors {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 680px) {
    .brand-header {
      position: static;
      transform: none;
      margin-bottom: 10px;
      pointer-events: auto;
    }

    .top-actions {
      min-height: 0;
      align-items: stretch;
    }
  }
</style>

<script>
  (function () {
    var THEME_KEY = 'cqexp.theme';

    function getPreferredTheme_() {
      var stored = window.localStorage.getItem(THEME_KEY);
      if (stored === 'light' || stored === 'dark') {
        return stored;
      }
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme_(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      window.localStorage.setItem(THEME_KEY, theme);
      updateThemeToggleLabel_();
    }

    function updateThemeToggleLabel_() {
      var theme = document.documentElement.getAttribute('data-theme') || 'light';
      var toggles = document.querySelectorAll('[data-theme-toggle]');
      for (var i = 0; i < toggles.length; i += 1) {
        toggles[i].textContent = theme === 'dark' ? '☀️' : '🌙';
        toggles[i].setAttribute('aria-label', theme === 'dark' ? 'Ativar modo claro' : 'Ativar modo escuro');
        toggles[i].setAttribute('title', theme === 'dark' ? 'Ativar modo claro' : 'Ativar modo escuro');
      }
    }

    window.initThemeToggle_ = function () {
      var toggles = document.querySelectorAll('[data-theme-toggle]');
      for (var i = 0; i < toggles.length; i += 1) {
        toggles[i].addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          applyTheme_(current === 'dark' ? 'light' : 'dark');
        });
      }
      updateThemeToggleLabel_();
    };

    applyTheme_(getPreferredTheme_());
  })();
</script>
