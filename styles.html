<style>
  :root {
    --bg: #f4f6fb;
    --text: #1f2a37;
    --primary: #0b57d0;
    --danger: #b42318;
    --ok: #067647;
    --border: #d0d5dd;
    --white: #fff;
  }
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
  }
  .container {
    max-width: 1024px;
    margin: 24px auto;
    padding: 0 16px 24px;
  }
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }
  label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 14px;
  }
  input,
  select,
  button {
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    padding: 10px;
  }
  button {
    cursor: pointer;
    background: var(--primary);
    color: var(--white);
    border-color: var(--primary);
  }
  button.secondary {
    background: transparent;
    color: var(--text);
    border-color: var(--border);
  }
  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .top-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .operator-selectors {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 10px;
  }
  .operator-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .selected-operators {
    margin-bottom: 14px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #f9fafb;
    font-size: 14px;
  }
  .checkbox-row {
    grid-column: 1 / -1;
    flex-direction: row;
    align-items: center;
    gap: 8px;
  }
  .checkbox-row input[type='checkbox'] {
    width: 16px;
    height: 16px;
    margin: 0;
    padding: 0;
  }
  .operator-slot {
    font-size: 14px;
  }
  .hint {
    margin: 0;
    color: #475467;
    font-size: 13px;
  }
  .defect-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .section-header h2,
  .defect-header h2 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
  }
  .table-wrap {
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th,
  td {
    border-bottom: 1px solid #eaecf0;
    padding: 8px;
    text-align: left;
  }
  th {
    font-weight: 400;
    font-size: 14px;
  }
  .row-remove {
    background: transparent;
    color: var(--danger);
    border-color: #fecdca;
    padding: 6px 8px;
  }
  .message {
    min-height: 24px;
    font-weight: 600;
  }
  .message.error {
    color: var(--danger);
  }
  .message.success {
    color: var(--ok);
  }
  .message.info {
    color: #475467;
  }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 10;
  }
  .modal-backdrop.hidden {
    display: none;
  }
  .modal-card {
    width: min(760px, 100%);
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 16px;
  }
    .modal-card-sm {
    width: min(420px, 100%);
  }
  .modal-actions {
    margin-top: 14px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .modal-header h3 {
    margin: 0;
  }
  .icon-btn {
    width: 34px;
    height: 34px;
    min-width: 34px;
    padding: 0;
    font-size: 22px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    color: var(--text);
    border-color: var(--border);
  }
</style>
