<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editar colaboradores</title>
    <?!= include('styles') ?>
  </head>
  <body>
    <main class="container">
      <section class="top-actions">
        <button class="secondary" type="button" onclick="goBack_()">← Voltar</button>
      </section>

      <section class="card">
        <h2>Editar colaboradores</h2>
        <p class="hint">
          Esta tela foi carregada com sucesso. A edição detalhada de colaboradores será disponibilizada na próxima etapa.
        </p>
      </section>
    </main>

    <script>
      window.APP_BASE_URL = <?!= JSON.stringify(appBaseUrl || '') ?>;

      function goBack_() {
        if (window.APP_BASE_URL) {
          window.location.href = window.APP_BASE_URL;
          return;
        }

        var currentUrl = window.location.href;
        var urlWithoutPage = currentUrl
          .replace(/([?&])page=[^&]*/g, '$1')
          .replace(/[?&]$/, '');

        window.location.href = urlWithoutPage;
      }
    </script>
  </body>
</html>
