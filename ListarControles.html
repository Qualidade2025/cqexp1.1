<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Listar controles</title>
    <?!= include('styles') ?>
    <style>
      .page-title {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        text-align: center;
      }

      .page-header {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .header-actions-left,
      .header-actions-right {
        display: flex;
        align-items: center;
      }

      .filters-card {
        border: none;
      }

      .filters-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 10px;
      }

      .filters-grid > label {
        margin: 0;
      }

      .filter-compact {
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
      }

      .list-total {
        margin: 10px 4px;
      }

      .table-actions {
        display: flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
      }

      .controls-table-wrap {
        max-height: 620px;
        overflow-y: auto;
      }

      #inspectionsTable th,
      #inspectionsTable td {
        font-size: 12px;
        line-height: 1.2;
        white-space: nowrap;
      }

      #inspectionsTable th {
        text-align: center;
        font-weight: 700;
      }

      #inspectionsTable td.cell-center {
        text-align: center;
      }

      #inspectionsTable td.cell-left {
        text-align: left;
      }

      .sort-trigger {
        width: 100%;
        border: none;
        background: transparent;
        color: inherit;
        padding: 0;
        font: inherit;
        font-weight: inherit;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 4px;
      }

      .sort-trigger:hover {
        text-decoration: underline;
      }

      .sort-indicator {
        font-size: 10px;
        opacity: 0.8;
        min-width: 10px;
      }

     .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        border: 1px solid var(--border-strong);
        background: var(--surface-soft);
      }

      .pill.ok {
        color: var(--ok);
      }

      .pill.warning {
        color: var(--danger);
      }

      .details-list {
        display: grid;
        grid-template-columns: 1fr 1fr 2fr 1fr 1fr;
        gap: 8px;
        margin: 10px 0;
      }

      @media (max-width: 1180px) {
        .filters-grid {
          grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        }
      }

      @media (max-width: 960px) {
        .details-list {
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }
      }

      .details-box {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        background: var(--surface-muted);
      }

      .details-box p {
        margin: 0;
        font-size: 13px;
      }

      #detailsDefectsTable td,
      #detailsDefectsTable th {
        font-size: 13px;
      }

      .nowrap {
        white-space: nowrap;
      }

      #detailsEditBtn {
        min-width: 96px;
      }


      .edit-form-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
        margin-top: 8px;
      }
      .field-row1-col1 { grid-column: 1; }
      .field-row1-col2 { grid-column: 2; }
      .field-row1-col3 { grid-column: 3; }
      .field-row1-col4 { grid-column: 4; }
      .field-row2-col1 { grid-column: 1; }
      .field-row2-col2 { grid-column: 2; }
      .field-row2-col3 { grid-column: 3; }
      .field-row3-col1 { grid-column: 1; }
      .field-row3-col2 { grid-column: 2; }
      .field-row3-col3 { grid-column: 3; }
      .field-row3-col4 { grid-column: 4; }
      .field-row3-col5 { grid-column: 5; }

      .edit-form-grid label {
        margin: 0;
      }

      .edit-form-grid textarea {
        min-height: 92px;
        resize: vertical;
      }

      .edit-form-grid .full-width {
        grid-column: 1 / -1;
      }

      #editDetailsModal .modal-card {
        width: min(980px, 100%);
        max-height: calc(100vh - 32px);
        overflow-y: auto;
      }

      .edit-modal-block {
        margin-top: 12px;
      }

      .edit-modal-block:first-of-type {
        margin-top: 8px;
      }

      .edit-defect-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .edit-defect-header h4 {
        margin: 0;
        font-size: 18px;
      }

      #editDefectRows .posicao,
      #editDefectRows .defeito {
        width: 100%;
        min-width: 120px;
      }

      #editDefectRows .quantidade {
        width: 100px;
      }

      @media (max-width: 920px) {
        .edit-form-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .edit-form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="page-header">
        <div class="header-actions-left">
          <span class="button-with-status">
            <button class="secondary" type="button" onclick="goBack_()">← Voltar</button>
            <span id="goBackStatus" class="hint inline-status" aria-live="polite"></span>
          </span>
        </div>
        <h2 class="page-title">Listar controles</h2>
        <div class="header-actions-right">
          <button class="secondary theme-toggle" type="button" data-theme-toggle aria-label="Alternar tema">🌙</button>
        </div>
      </section>

      <section class="card filters-card">
        <div class="filters-grid">
          <label>
            Data inicial
            <input id="filterDateStart" class="filter-compact" type="date" />
          </label>
          <label>
            Data final
            <input id="filterDateEnd" class="filter-compact" type="date" />
          </label>
          <label>
            OP
            <input id="filterOp" class="filter-compact" type="text" maxlength="50" placeholder="Ex.: OP12345" />
          </label>
          <label>
            Cliente
            <input id="filterCliente" class="filter-compact" type="text" maxlength="120" placeholder="Nome do cliente" />
          </label>
          <label>
            Origem
            <select id="filterOrigem" class="filter-compact">
              <option value="">Todas</option>
            </select>
          </label>
          <label>
            Retrabalho
            <select id="filterRetrabalho" class="filter-compact">
              <option value="todos">Todos</option>
              <option value="sim">Somente retrabalho</option>
              <option value="nao">Sem retrabalho</option>
            </select>
          </label>
          <label>
            Operador
            <input id="filterOperador" class="filter-compact" type="text" maxlength="120" placeholder="Nome ou ID" />
          </label>
        </div>

        <section class="actions">
          <button id="applyFiltersBtn" type="button">Filtrar</button>
          <button id="clearFiltersBtn" class="secondary" type="button">Limpar filtros</button>
        </section>
      </section>

      <p id="paginationInfo" class="hint list-total">Total: 0</p>

      <section class="card">
        <div class="table-wrap controls-table-wrap">
          <table id="inspectionsTable">
            <thead>
              <tr>
                <th class="nowrap" data-sort-key="idInspecao" data-sort-type="numeric">
                  <button type="button" class="sort-trigger"><span class="sort-label">ID</span><span class="sort-indicator"></span></button>
                </th>
                <th class="nowrap" data-sort-key="dataServidorSort" data-sort-type="date">
                  <button type="button" class="sort-trigger"><span class="sort-label">Data/Hora</span><span class="sort-indicator"></span></button>
                </th>
                <th data-sort-key="op" data-sort-type="alpha">
                  <button type="button" class="sort-trigger"><span class="sort-label">OP</span><span class="sort-indicator"></span></button>
                </th>
                <th data-sort-key="cliente" data-sort-type="alpha">
                  <button type="button" class="sort-trigger"><span class="sort-label">Cliente</span><span class="sort-indicator"></span></button>
                </th>
                <th class="nowrap" data-sort-key="qtddRevisada" data-sort-type="numeric">
                  <button type="button" class="sort-trigger"><span class="sort-label">Qtdd</span><span class="sort-indicator"></span></button>
                </th>
                <th data-sort-key="origem" data-sort-type="alpha">
                  <button type="button" class="sort-trigger"><span class="sort-label">Origem</span><span class="sort-indicator"></span></button>
                </th>
                <th data-sort-key="operadores" data-sort-type="alpha">
                  <button type="button" class="sort-trigger"><span class="sort-label">Operadores</span><span class="sort-indicator"></span></button>
                </th>
                <th class="nowrap" data-sort-key="totalDefeitos" data-sort-type="numeric">
                  <button type="button" class="sort-trigger"><span class="sort-label">Defeitos</span><span class="sort-indicator"></span></button>
                </th>
                <th data-sort-key="retrabalho" data-sort-type="boolean">
                  <button type="button" class="sort-trigger"><span class="sort-label">Retrabalho</span><span class="sort-indicator"></span></button>
                </th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="inspectionsRows"></tbody>
          </table>
        </div>
      </section>

      <section id="messageBox" class="message" aria-live="polite"></section>
    </main>

    <div id="detailsModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="detailsModalTitle">
      <section class="modal-card">
        <div class="modal-header">
          <h3 id="detailsModalTitle">Detalhes da inspeção</h3>
          <button id="closeDetailsBtn" class="icon-btn" type="button" aria-label="Fechar modal">×</button>
        </div>

        <div class="details-list">
          <div class="details-box"><p><strong>Data:</strong> <span id="detailsDate"></span></p></div>
          <div class="details-box"><p><strong>OP:</strong> <span id="detailsOp"></span></p></div>
          <div class="details-box"><p><strong>Cliente:</strong> <span id="detailsCliente"></span></p></div>
          <div class="details-box"><p><strong>Origem:</strong> <span id="detailsOrigem"></span></p></div>
          <div class="details-box"><p><strong>Retrabalho:</strong> <span id="detailsRetrabalho"></span></p></div>
        </div>

       <p class="hint" id="detailsOperators"></p>

        <div class="table-wrap" style="margin-top: 8px;">
          <table id="detailsDefectsTable">
            <thead>
              <tr>
                <th>Linha</th>
                <th>Posição</th>
                <th>Defeito</th>
                <th>Quantidade</th>
              </tr>
            </thead>
            <tbody id="detailsDefectsRows"></tbody>
          </table>
        </div>

        <p id="detailsFallback" class="hint" style="margin-top: 8px;"></p>

        <div class="modal-actions">
          <button id="detailsEditBtn" class="secondary" type="button">Editar</button>
        </div>
      </section>
    </div>

    <div id="editDetailsModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="editDetailsModalTitle">
      <section class="modal-card">
        <div class="modal-header">
          <h3 id="editDetailsModalTitle">Editar inspeção</h3>
          <button id="closeEditDetailsBtn" class="icon-btn" type="button" aria-label="Fechar modal de edição">×</button>
        </div>

        <form id="editDetailsForm">
          <section class="card edit-modal-block">

              <h2>Identificação</h2>
            </div>
            <div class="edit-form-grid">
             <label class="field-row1-col1">
                Data/Hora
                <input id="editDataServidor" type="datetime-local" readonly />
              </label>
              <label class="field-row1-col2">
                ID
                <input id="editIdInspecao" type="text" readonly />
              </label>
              <label class="field-row1-col3">
                Retrabalho
                <select id="editRetrabalho">
                  <option value="nao">Não</option>
                  <option value="sim">Sim</option>
                </select>
              </label>

                Origem

                Operador 1
                <select id="editOperador1"></select>
              </label>
              <label class="field-row3-col3">
                Operador 2
                <select id="editOperador2"></select>
              </label>
              <label class="field-row3-col4">
                Operador 3
                <select id="editOperador3"></select>
              </label>
              <label class="field-row3-col5">
                Operador 4

              </label>

          <section class="card edit-modal-block">

              <h4>Defeitos</h4>

            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Posição</th>
                    <th>Defeito</th>
                    <th>Quantidade</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="editDefectRows"></tbody>
              </table>
            </div>

          <input id="editTotalLancamentos" type="hidden" />

          <div class="modal-actions">
            <button id="cancelEditDetailsBtn" class="secondary" type="button">Cancelar</button>
            <button id="saveEditDetailsBtn" type="submit">Salvar alterações</button>
          </div>
        </form>
      </section>
    </div>

    <div id="editSavingOverlay" class="startup-loading hidden" role="status" aria-live="polite">
      <div class="startup-loading-card">
        <span class="loading-spinner" aria-hidden="true"></span>
        <span>Salvando edição...</span>
      </div>
    </div>

    <script>
      window.APP_BASE_URL = <?!= JSON.stringify(appBaseUrl || '') ?>;

      var listState = {
        page: 1,
        pageSize: 1000,
        totalPages: 1,
        total: 0,
        items: [],
        sort: {
          key: null,
          type: null,
          direction: 'asc'
        }
      };
      var currentDetailsItem = null;
      var editCatalogs = {
        origens: [],
        colaboradores: [],
        posicoes: [],
        defeitosPorPosicao: {}
      };

      if (typeof window.initThemeToggle_ === 'function') {
        window.initThemeToggle_();
      }

      function initPage_() {
        bindActions_();
        loadCatalogsForFilters_();
        loadInspections_();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPage_);
      } else {
        initPage_();
      }

      function bindActions_() {
        document.getElementById('applyFiltersBtn').addEventListener('click', function () {
          listState.page = 1;
          loadInspections_();
        });

        document.getElementById('clearFiltersBtn').addEventListener('click', function () {
          clearFilters_();
          listState.page = 1;
          loadInspections_();
        });

        document.getElementById('closeDetailsBtn').addEventListener('click', closeDetailsModal_);
        document.getElementById('detailsEditBtn').addEventListener('click', handleEditDetails_);
        document.getElementById('closeEditDetailsBtn').addEventListener('click', closeEditModal_);
        document.getElementById('cancelEditDetailsBtn').addEventListener('click', closeEditModal_);
        document.getElementById('editDetailsForm').addEventListener('submit', submitEditDetails_);

        Array.prototype.slice.call(document.querySelectorAll('#inspectionsTable th[data-sort-key]')).forEach(function (header) {
          header.addEventListener('click', function () {
            applySort_(header);
          });
        });
      }

      function applySort_(header) {
        var sortKey = String(header.getAttribute('data-sort-key') || '');
        var sortType = String(header.getAttribute('data-sort-type') || 'alpha');
        if (!sortKey) {
          return;
        }

        if (listState.sort.key === sortKey) {
          listState.sort.direction = listState.sort.direction === 'asc' ? 'desc' : 'asc';
        } else {
          listState.sort.key = sortKey;
          listState.sort.type = sortType;
          listState.sort.direction = 'asc';
        }

        updateSortIndicators_();
        renderTable_(listState.items);
      }

      function loadCatalogsForFilters_() {
        if (!window.google || !google.script || !google.script.run) {
          return;
        }

        google.script.run
          .withSuccessHandler(function (catalogs) {
            var origemSelect = document.getElementById('filterOrigem');
            var origens = catalogs && Array.isArray(catalogs.origens) ? catalogs.origens : [];
            var colaboradores = catalogs && Array.isArray(catalogs.colaboradores) ? catalogs.colaboradores : [];
            editCatalogs.origens = origens;
            editCatalogs.colaboradores = colaboradores;
            editCatalogs.posicoes = catalogs && Array.isArray(catalogs.posicoes) ? catalogs.posicoes : [];
            editCatalogs.defeitosPorPosicao = catalogs && catalogs.defeitosPorPosicao ? catalogs.defeitosPorPosicao : {};

            origens.forEach(function (origem) {
              var value = String(origem || '').trim();
              if (!value) {
                return;
              }

              var option = document.createElement('option');
              option.value = value;
              option.textContent = value;
              origemSelect.appendChild(option);
            });

            renderEditCatalogSelects_();
          })
          .withFailureHandler(function () {})
          .getCatalogs();
      }

      function renderEditCatalogSelects_() {
        fillSelectWithValues_(document.getElementById('editOrigem'), editCatalogs.origens);

        ['editOperador1', 'editOperador2', 'editOperador3', 'editOperador4'].forEach(function (id) {
          fillOperatorSelect_(document.getElementById(id), editCatalogs.colaboradores);
        });
      }

      function fillSelectWithValues_(select, values) {
        if (!select) {
          return;
        }

        select.innerHTML = '';
        appendPlaceholderOption_(select);
        (values || []).forEach(function (entry) {
          var normalized = String(entry || '').trim();
          if (!normalized) {
            return;
          }
          var option = document.createElement('option');
          option.value = normalized;
          option.textContent = normalized;
          select.appendChild(option);
        });
      }

      function fillOperatorSelect_(select, colaboradores) {
        if (!select) {
          return;
        }

        select.innerHTML = '';
        appendPlaceholderOption_(select);
        (colaboradores || []).forEach(function (colab) {
          var name = String(colab && colab.name || '').trim();
          var id = String(colab && colab.id || '').trim();
          if (!name) {
            return;
          }
          var option = document.createElement('option');
          option.value = name;
          option.textContent = id ? name + ' (' + id + ')' : name;
          select.appendChild(option);
        });
      }

      function setSelectValueEnsuringOption_(select, value) {
        if (!select) {
          return;
        }

        var normalized = String(value || '').trim();
        if (!normalized) {
          select.value = '';
          return;
        }

        var hasValue = Array.prototype.slice.call(select.options || []).some(function (option) {
          return String(option.value || '') === normalized;
        });

        if (!hasValue) {
          var option = document.createElement('option');
          option.value = normalized;
          option.textContent = normalized;
          select.appendChild(option);
        }

        select.value = normalized;
      }

      function loadInspections_() {
        if (!window.google || !google.script || !google.script.run) {
          setMessage_('Ambiente do Apps Script indisponível para listar inspeções.', 'error');
          return;
        }

        setMessage_('Carregando inspeções...', 'info');

        google.script.run
          .withSuccessHandler(function (response) {
            var result = response || {};
            listState.items = Array.isArray(result.items) ? result.items : [];
            listState.total = Number(result.total) || 0;
            listState.page = Number(result.page) || 1;
            listState.pageSize = Number(result.pageSize) || 1000;
            listState.totalPages = Number(result.totalPages) || 1;

            renderTable_(listState.items);
            updatePagination_();

            if (!listState.items.length) {
              setMessage_('Nenhum controle encontrado para os filtros informados.', 'info');
            } else {
              setMessage_('Total filtrado: ' + listState.total + ' inspeções.', 'success', true);
            }
          })
          .withFailureHandler(function (error) {
            setMessage_('Falha ao carregar inspeções: ' + (error.message || error), 'error');
          })
          .listInspectionsControls(getFiltersPayload_());
      }

     function getFiltersPayload_() {
        return {
          page: listState.page,
          pageSize: listState.pageSize,
          dataInicial: String(document.getElementById('filterDateStart').value || '').trim(),
          dataFinal: String(document.getElementById('filterDateEnd').value || '').trim(),
          op: String(document.getElementById('filterOp').value || '').trim(),
          cliente: String(document.getElementById('filterCliente').value || '').trim(),
          origem: String(document.getElementById('filterOrigem').value || '').trim(),
          operador: String(document.getElementById('filterOperador').value || '').trim(),
          retrabalho: String(document.getElementById('filterRetrabalho').value || 'todos').trim()
        };
      }

      function clearFilters_() {
        document.getElementById('filterDateStart').value = '';
        document.getElementById('filterDateEnd').value = '';
        document.getElementById('filterOp').value = '';
        document.getElementById('filterCliente').value = '';
        document.getElementById('filterOrigem').value = '';
        document.getElementById('filterOperador').value = '';
        document.getElementById('filterRetrabalho').value = 'todos';
      }

      function renderTable_(items) {
        var tbody = document.getElementById('inspectionsRows');
        tbody.innerHTML = '';

       var sortedItems = sortItems_(items);

        sortedItems.forEach(function (item) {
          var tr = document.createElement('tr');

          appendCell_(tr, String(item.idInspecao || ''), 'cell-center');
          appendCell_(tr, item.dataServidorLabel || '-', 'cell-center');
          appendCell_(tr, item.op || '-', 'cell-center');
          appendCell_(tr, item.cliente || '-', 'cell-center');
          appendCell_(tr, String(item.qtddRevisada || 0), 'cell-center');
          appendCell_(tr, item.origem || '-', 'cell-center');
          appendCell_(tr, (item.operadores || []).join(', ') || '-', 'cell-left');
          appendCell_(tr, String(item.totalDefeitos || 0), 'cell-center');

          var retrabalhoCell = document.createElement('td');
          retrabalhoCell.className = 'cell-center';
          var tag = document.createElement('span');
          tag.className = 'pill ' + (item.retrabalho ? 'warning' : 'ok');
          tag.textContent = item.retrabalho ? 'Sim' : 'Não';
          retrabalhoCell.appendChild(tag);
          tr.appendChild(retrabalhoCell);

          var actionCell = document.createElement('td');
          actionCell.className = 'table-actions cell-center';
          var detailsBtn = document.createElement('button');
          detailsBtn.type = 'button';
          detailsBtn.className = 'secondary';
          detailsBtn.textContent = 'Ver detalhes';
          detailsBtn.addEventListener('click', function () {
            openDetailsModal_(item);
          });
          actionCell.appendChild(detailsBtn);
          tr.appendChild(actionCell);

          tbody.appendChild(tr);
        });
      }

      function appendCell_(tr, value, className) {
        var td = document.createElement('td');
        if (className) {
          td.className = className;
        }
        td.textContent = value;
        tr.appendChild(td);
      }

      function sortItems_(items) {
        var sort = listState.sort || {};
        if (!sort.key) {
          return (items || []).slice();
        }

        var sorted = (items || []).slice();
        var directionFactor = sort.direction === 'desc' ? -1 : 1;

        sorted.sort(function (a, b) {
          var left = getComparableValue_(a, sort.key, sort.type);
          var right = getComparableValue_(b, sort.key, sort.type);

          if (sort.type === 'alpha') {
            return left.localeCompare(right, 'pt-BR', { numeric: true, sensitivity: 'base' }) * directionFactor;
          }

          if (left < right) {
            return -1 * directionFactor;
          }
          if (left > right) {
            return 1 * directionFactor;
          }
          return 0;
        });

        return sorted;
      }

      function getComparableValue_(item, key, type) {
        if (key === 'operadores') {
          var operadores = (item && Array.isArray(item.operadores) ? item.operadores : []).join(', ');
          return String(operadores || '').toLowerCase();
        }

        if (type === 'numeric') {
          return Number(item && item[key]) || 0;
        }

        if (type === 'date') {
          var dateValue = item && (item[key] || item.dataServidor);
          var stamp = new Date(dateValue).getTime();
          return isNaN(stamp) ? 0 : stamp;
        }

        if (type === 'boolean') {
          return item && item[key] ? 1 : 0;
        }

        return String(item && item[key] || '')
          .toLowerCase()
          .trim();
      }

      function updateSortIndicators_() {
        Array.prototype.slice.call(document.querySelectorAll('#inspectionsTable th[data-sort-key]')).forEach(function (header) {
          var sortKey = String(header.getAttribute('data-sort-key') || '');
          var indicator = header.querySelector('.sort-indicator');
          if (!indicator) {
            return;
          }

          if (listState.sort.key === sortKey) {
            indicator.textContent = listState.sort.direction === 'asc' ? '▲' : '▼';
            header.setAttribute('aria-sort', listState.sort.direction === 'asc' ? 'ascending' : 'descending');
          } else {
            indicator.textContent = '';
            header.removeAttribute('aria-sort');
          }
        });
      }

      function updatePagination_() {
        var info = document.getElementById('paginationInfo');
        info.textContent = 'Total: ' + listState.total;
      }

      function openDetailsModal_(item) {
        if (!item) {
          return;
        }

        currentDetailsItem = item;

        document.getElementById('detailsDate').textContent = item.dataServidorLabel || '-';
        document.getElementById('detailsOp').textContent = item.op || '-';
        document.getElementById('detailsCliente').textContent = item.cliente || '-';
        document.getElementById('detailsOrigem').textContent = item.origem || '-';
        document.getElementById('detailsRetrabalho').textContent = item.retrabalho ? 'Sim' : 'Não';
        document.getElementById('detailsOperators').textContent = 'Operadores: ' + ((item.operadores || []).join(', ') || '-');

        var detailsRows = document.getElementById('detailsDefectsRows');
        var fallback = document.getElementById('detailsFallback');
        detailsRows.innerHTML = '';
        fallback.textContent = '';

        var parsed = parseDefectsPayload_(item.defeitosJsonRaw);
        if (parsed && parsed.length) {
          parsed.forEach(function (defect, idx) {

            var tr = document.createElement('tr');
            appendCell_(tr, String(defect.linha || idx + 1));
            appendCell_(tr, String(defect.posicao || '-'));
            appendCell_(tr, String(defect.defeito || '-'));
            appendCell_(tr, String(defect.quantidade || 0));
            detailsRows.appendChild(tr);
          });
        } else {
          var tr = document.createElement('tr');
          var emptyCell = document.createElement('td');
          emptyCell.colSpan = 4;
          emptyCell.textContent = 'Sem defeitos detalhados no JSON.';
          tr.appendChild(emptyCell);
          detailsRows.appendChild(tr);

          if (item.defeitosResumo) {
            fallback.textContent = 'Resumo: ' + item.defeitosResumo;
          }
        }

        document.getElementById('detailsModal').classList.remove('hidden');
      }

     function parseDefectsPayload_(raw) {
        var normalized = String(raw || '').trim();
        if (!normalized) {
          return [];
        }

        try {
          var parsed = JSON.parse(normalized);
          if (Array.isArray(parsed)) {
            return parsed;
          }
          return [];
        } catch (error) {
          return [];
        }
      }

      function closeDetailsModal_() {
      currentDetailsItem = null;
        document.getElementById('detailsModal').classList.add('hidden');
      }


      function handleEditDetails_() {
        if (!currentDetailsItem) {
          setMessage_('Selecione um registro para editar.', 'error');
          return;
        }

        populateEditForm_(currentDetailsItem);
        document.getElementById('editDetailsModal').classList.remove('hidden');
      }

      function populateEditForm_(item) {
        document.getElementById('editIdInspecao').value = String(item.idInspecao || '');
        document.getElementById('editDataServidor').value = toDatetimeLocalValue_(item.dataServidorIso);
        document.getElementById('editOp').value = String(item.op || '');
        document.getElementById('editQtddRevisada').value = Number(item.qtddRevisada) || 0;
        setSelectValueEnsuringOption_(document.getElementById('editOrigem'), String(item.origem || ''));
        document.getElementById('editCliente').value = String(item.cliente || '');
        document.getElementById('editCriadoPorEmail').value = String(item.criadoPorEmail || '');
        document.getElementById('editRetrabalho').value = item.retrabalho ? 'sim' : 'nao';

        var operators = Array.isArray(item.operadores) ? item.operadores : [];
        setSelectValueEnsuringOption_(document.getElementById('editOperador1'), operators[0] || '');
        setSelectValueEnsuringOption_(document.getElementById('editOperador2'), operators[1] || '');
        setSelectValueEnsuringOption_(document.getElementById('editOperador3'), operators[2] || '');
        setSelectValueEnsuringOption_(document.getElementById('editOperador4'), operators[3] || '');

        var parsedDefects = parseDefectsPayload_(item.defeitosJsonRaw);
        renderEditDefectRows_(parsedDefects);
      }

      function appendPlaceholderOption_(select) {
        var option = document.createElement('option');
        option.value = '';
        option.textContent = 'Selecione...';
        select.appendChild(option);
      }

      function renderEditDefectsForPosition_(selectDef, posicao) {
        var previousDefect = String(selectDef.value || '');
        var defectMap = editCatalogs.defeitosPorPosicao || {};
        var defects = defectMap[posicao] || [];
        selectDef.innerHTML = '';
        appendPlaceholderOption_(selectDef);

        defects.forEach(function (def) {
          var opt = document.createElement('option');
          opt.value = def;
          opt.textContent = def;
          selectDef.appendChild(opt);
        });

        selectDef.disabled = !posicao;
        if (previousDefect && defects.indexOf(previousDefect) !== -1) {
          selectDef.value = previousDefect;
        }
      }

      function addEditDefectRow_(item) {
        var tbody = document.getElementById('editDefectRows');
        var tr = document.createElement('tr');

        var tdPos = document.createElement('td');
        var selectPos = document.createElement('select');
        selectPos.className = 'posicao';
        appendPlaceholderOption_(selectPos);
        (editCatalogs.posicoes || []).forEach(function (posicao) {
          var opt = document.createElement('option');
          opt.value = posicao;
          opt.textContent = posicao;
          selectPos.appendChild(opt);
        });
        tdPos.appendChild(selectPos);

        var tdDef = document.createElement('td');
        var selectDef = document.createElement('select');
        selectDef.className = 'defeito';
        tdDef.appendChild(selectDef);

        var tdQtd = document.createElement('td');
        var inputQtd = document.createElement('input');
        inputQtd.type = 'number';
        inputQtd.className = 'quantidade';
        inputQtd.min = '1';
        inputQtd.step = '1';
        tdQtd.appendChild(inputQtd);

        var tdAction = document.createElement('td');
        var removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'row-remove';
        removeBtn.textContent = 'Remover';
        removeBtn.addEventListener('click', function () {
          tr.remove();
          if (!document.querySelectorAll('#editDefectRows tr').length) {
            addEditDefectRow_();
          }
        });
        tdAction.appendChild(removeBtn);

        selectPos.addEventListener('change', function () {
          renderEditDefectsForPosition_(selectDef, selectPos.value);
        });

        tr.appendChild(tdPos);
        tr.appendChild(tdDef);
        tr.appendChild(tdQtd);
        tr.appendChild(tdAction);
        tbody.appendChild(tr);

        renderEditDefectsForPosition_(selectDef, item && item.posicao ? String(item.posicao) : '');
        selectPos.value = item && item.posicao ? String(item.posicao) : '';
        if (item && item.defeito) {
          selectDef.value = String(item.defeito);
        }
        inputQtd.value = item && item.quantidade ? Number(item.quantidade) : '';
      }

      function renderEditDefectRows_(items) {
        var tbody = document.getElementById('editDefectRows');
        tbody.innerHTML = '';

        if (!items || !items.length) {
          addEditDefectRow_();
          return;
        }

        items.forEach(function (item) {
          addEditDefectRow_(item);
        });
      }

      function collectEditDefects_() {
        return Array.prototype.slice.call(document.querySelectorAll('#editDefectRows tr')).map(function (tr) {
          var qtyInput = tr.querySelector('.quantidade');
          return {
            posicao: String((tr.querySelector('.posicao') || {}).value || '').trim(),
            defeito: String((tr.querySelector('.defeito') || {}).value || '').trim(),
            quantidade: String((qtyInput && qtyInput.value) || '').trim()
          };
        }).filter(function (item) {
          return item.posicao || item.defeito || item.quantidade;
        });
      }

      function toDatetimeLocalValue_(isoValue) {
        if (!isoValue) {
          return '';
        }
        var date = new Date(isoValue);
        if (isNaN(date.getTime())) {
          return '';
        }

        var year = date.getFullYear();
        var month = String(date.getMonth() + 1).padStart(2, '0');
        var day = String(date.getDate()).padStart(2, '0');
        var hour = String(date.getHours()).padStart(2, '0');
        var minute = String(date.getMinutes()).padStart(2, '0');
        return year + '-' + month + '-' + day + 'T' + hour + ':' + minute;
      }

      function closeEditModal_() {
        document.getElementById('editDetailsModal').classList.add('hidden');
      }

      function submitEditDetails_(event) {
        event.preventDefault();

        if (!currentDetailsItem) {
          setMessage_('Selecione um registro para editar.', 'error');
          return;
        }

        if (!window.google || !google.script || !google.script.run) {
          setMessage_('Ambiente do Apps Script indisponível para editar inspeções.', 'error');
          return;
        }

        var editDefects = collectEditDefects_();
        var defectsJsonRaw = editDefects.length ? JSON.stringify(editDefects) : '';
        var defectsSummary = editDefects.map(function (defect) {
          return [defect.posicao, defect.defeito, defect.quantidade].join(' / ');
        }).join(' | ');

        document.getElementById('editTotalLancamentos').value = editDefects.length;
        document.getElementById('editDefeitosJson').value = defectsJsonRaw;
        document.getElementById('editDefeitosResumo').value = defectsSummary;

        var payload = {
          idInspecao: currentDetailsItem.idInspecao,
          sheetRowNumber: currentDetailsItem.sheetRowNumber,
          dataServidor: String(document.getElementById('editDataServidor').value || '').trim(),
          op: String(document.getElementById('editOp').value || '').trim(),
          qtddRevisada: Number(document.getElementById('editQtddRevisada').value || 0),
          origem: String(document.getElementById('editOrigem').value || '').trim(),
          cliente: String(document.getElementById('editCliente').value || '').trim(),
          criadoPorEmail: String(document.getElementById('editCriadoPorEmail').value || '').trim(),
          operadores: [
            String(document.getElementById('editOperador1').value || '').trim(),
            String(document.getElementById('editOperador2').value || '').trim(),
            String(document.getElementById('editOperador3').value || '').trim(),
            String(document.getElementById('editOperador4').value || '').trim()
          ],
          totalLancamentosDefeitos: Number(document.getElementById('editTotalLancamentos').value || 0),
          defeitosJsonRaw: String(document.getElementById('editDefeitosJson').value || '').trim(),
          defeitosResumo: String(document.getElementById('editDefeitosResumo').value || '').trim(),
          retrabalho: String(document.getElementById('editRetrabalho').value || 'nao').trim() === 'sim'
        };

        setMessage_('Salvando edição da inspeção...', 'info');
       setEditSavingOverlay_(true);
        google.script.run
          .withSuccessHandler(function () {
            setEditSavingOverlay_(false);
            closeEditModal_();
            closeDetailsModal_();
            loadInspections_();
            setMessage_('Inspeção atualizada com sucesso.', 'success', true);
          })
          .withFailureHandler(function (error) {
            setEditSavingOverlay_(false);
            setMessage_('Falha ao editar inspeção: ' + (error.message || error), 'error');
          })
          .updateInspectionControl(payload);
      }

      function setEditSavingOverlay_(loading) {
        var overlay = document.getElementById('editSavingOverlay');
        if (!overlay) {
          return;
        }
        if (loading) {
          overlay.classList.remove('hidden');
          return;
        }
        overlay.classList.add('hidden');
      }

      document.getElementById('addEditDefectBtn').addEventListener('click', function () {
        addEditDefectRow_();
      });

      function showInlineStatus_(elementId, text) {
        var target = document.getElementById(elementId);
        if (!target) {
          return;
        }

        target.textContent = text || '';
      }

      function navigateToMainPage_(url) {
        try {
          window.top.location.href = url;
        } catch (error) {
          window.location.href = url;
        }
      }

      function goBack_() {
        showInlineStatus_('goBackStatus', 'Voltando...');

        if (window.APP_BASE_URL) {
          navigateToMainPage_(window.APP_BASE_URL);
          return;
        }

        var fallbackUrl = new URL(window.location.href);
        fallbackUrl.searchParams.set('page', 'index');
        navigateToMainPage_(fallbackUrl.toString());
      }

      function setMessage_(text, type, autoClear) {
        var messageBox = document.getElementById('messageBox');
        messageBox.textContent = text || '';
        messageBox.className = 'message' + (type ? ' ' + type : '');

        if (autoClear) {
          window.setTimeout(function () {
            if (messageBox.textContent === text) {
              messageBox.textContent = '';
              messageBox.className = 'message';
            }
          }, 3500);
        }
      }
    </script>
  </body>
</html>
