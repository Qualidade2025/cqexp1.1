    <style>
      .page-title {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        text-align: center;
      }

      .page-header {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .header-actions-left,
      .header-actions-right {
        display: flex;
        align-items: center;
      }

      .filters-card {
        border: none;
      }

      .filters-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 10px;
      }

      .filters-grid > label {
        margin: 0;
      }

      .filter-compact {
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
      }

      .filter-compact.placeholder-selected {
        color: #757575;
      }

      .list-summary-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 10px 4px;
      }

      .list-total {
        margin: 0;
      }

      .list-aggregates {
        margin: 0;
        text-align: right;
      }

      .list-pager {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .list-pager button {
        width: 30px;
        height: 30px;
        min-width: 30px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .pager-triangle {
        position: relative;
      }

      .pager-triangle::before {
        content: '';
        width: 0;
        height: 0;
        border-top: 7px solid transparent;
        border-bottom: 7px solid transparent;
      }

      .pager-triangle.prev::before {
        border-right: 10px solid currentColor;
      }

      .pager-triangle.next::before {
        border-left: 10px solid currentColor;
      }

      .table-actions {
        text-align: center;
        vertical-align: middle;
      }

      .table-actions button {
        margin: 0 auto;
      }

      .controls-table-wrap {
        position: relative;
        max-height: 620px;
        overflow-y: auto;
      }

      .controls-table-wrap.is-loading {
        height: 620px;
        min-height: 620px;
        overflow-y: hidden;
      }

      .controls-table-wrap.is-loading #inspectionsTable tbody {
        display: none;
      }

      .table-loading-modal{
        position:absolute;
        top:0;
        left:0;
        right:0;
        bottom:0;
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:5;
      }

      .table-loading-modal.hidden{display:none !important}

      .table-loading-backdrop{
        position:absolute;
        top:0;
        left:0;
        right:0;
        bottom:0;
        background:transparent;
      }

      .table-loading-dialog{
        position:relative;
        z-index:1;
        width:72px;
        height:72px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        background:var(--surface);
        box-shadow:var(--shadow);
      }

      .table-loading-spinner{
        width:34px;
        height:34px;
        border:4px solid var(--border);
        border-top-color:var(--primary);
        border-radius:50%;
        animation:table-loading-spin 0.9s linear infinite;
      }

      @keyframes table-loading-spin{
        to{ transform:rotate(360deg); }
      }

      .navigation-loading-modal{
        position:fixed;
        inset:0;
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:40;
      }

      .navigation-loading-modal.hidden{display:none !important}

      .navigation-loading-modal .table-loading-backdrop{
        background:var(--overlay);
        -webkit-backdrop-filter: blur(5px);
        backdrop-filter: blur(5px);
      }

      #inspectionsTable th,
      #inspectionsTable td {
        font-size: 12px;
        line-height: 1.2;
        white-space: nowrap;
      }

      #inspectionsTable th {
        text-align: center;
        font-weight: 700;
      }

      #inspectionsTable td.cell-center {
        text-align: center;
      }

      #inspectionsTable td.cell-left {
        text-align: left;
      }

      #inspectionsTable th.cliente-col,

        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #inspectionsTable th.operadores-col,
      #inspectionsTable td.operadores-col {
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #inspectionsTable th.id-col .sort-trigger {
        position: relative;
      }

        position: absolute;

      }

      .sort-trigger {
        width: 100%;

    <script>
      window.APP_BASE_URL = <?!= JSON.stringify(appBaseUrl || '') ?>;

      var listState = {
        page: 1,
        pageSize: 50,
        totalPages: 1,
        total: 0,
        items: [],
        aggregates: {
          revisados: 0,
          defeitos: 0
        },
        sort: {
          key: null,
          type: null,
          direction: 'asc'
        }
      };
      var currentDetailsItem = null;
      var editCatalogs = {
        origens: [],
        colaboradores: [],
        posicoes: [],
        defeitosPorPosicao: {},
        origemObrigatoria: true,
        opObrigatoria: false
      };
      var editState = {
        opLocked: false,
        opLookup: {
          notFound: false,
          op: '',
          message: ''
        }
      };
      var OP_EMPTY_LABEL = 'Sem OP';

      if (typeof window.initThemeToggle_ === 'function') {
        window.initThemeToggle_();
      }

      function initPage_() {
        bindActions_();
        loadCatalogsForFilters_();
        loadInspections_();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPage_);
      } else {
        initPage_();
      }

      function bindActions_() {
        bindFilterFieldPlaceholderStyle_(document.getElementById('filterDateStart'));
        bindFilterFieldPlaceholderStyle_(document.getElementById('filterDateEnd'));
        bindFilterFieldPlaceholderStyle_(document.getElementById('filterOrigem'));
        bindFilterFieldPlaceholderStyle_(document.getElementById('filterRetrabalho'));

        document.getElementById('applyFiltersBtn').addEventListener('click', function () {
          listState.page = 1;
          loadInspections_();
        });

        document.getElementById('clearFiltersBtn').addEventListener('click', function () {
          clearFilters_();
          listState.page = 1;
          loadInspections_();
        });
        document.getElementById('prevPageBtn').addEventListener('click', function () {
          if (listState.page <= 1) {
            return;
          }
          listState.page -= 1;
          loadInspections_();
        });

      function fillSelectWithValues_(select, values) {
        if (!select) {
          return;
        }

        select.innerHTML = '';
        appendPlaceholderOption_(select);
        bindSelectPlaceholderStyle_(select);
        (values || []).forEach(function (entry) {
          var normalized = String(entry || '').trim();
          if (!normalized) {
            return;
          }
          var option = document.createElement('option');
          option.value = normalized;
          option.textContent = normalized;
          select.appendChild(option);
        });
      }

      function fillOperatorSelect_(select, colaboradores) {
        if (!select) {
          return;
        }

        select.innerHTML = '';
        appendPlaceholderOption_(select);
        bindSelectPlaceholderStyle_(select);
        (colaboradores || []).forEach(function (colab) {
          var name = String(colab && colab.name || '').trim();
          var id = String(colab && colab.id || '').trim();
          if (!name || !id) {
            return;
          }
          var option = document.createElement('option');
          option.value = id + ' - ' + name;
          option.textContent = name + ' (' + id + ')';
          select.appendChild(option);
        });
      }

      function normalizeOperatorValueForEditSelect_(rawValue) {
        var normalized = String(rawValue || '').trim();
        if (!normalized) {
          return '';
        }

        var delimiterIndex = normalized.indexOf(' - ');
        if (delimiterIndex > -1) {
          var idPart = normalized.slice(0, delimiterIndex).trim();
          var namePart = normalized.slice(delimiterIndex + 3).trim();
          if (idPart && namePart) {
            return idPart + ' - ' + namePart;
          }
        }

        var collaborators = Array.isArray(editCatalogs.colaboradores) ? editCatalogs.colaboradores : [];
        var byName = collaborators.find(function (colab) {
          return String(colab && colab.name || '').trim().toLowerCase() === normalized.toLowerCase();
        });

        if (byName) {
          var foundId = String(byName.id || '').trim();
          var foundName = String(byName.name || '').trim();
          if (foundId && foundName) {
            return foundId + ' - ' + foundName;
          }
        }

        return normalized;
      }

      function setSelectValueEnsuringOption_(select, value, formatter) {
        if (!select) {
          return;
        }

        var normalized = String(value || '').trim();
        if (typeof formatter === 'function') {
          normalized = String(formatter(normalized) || '').trim();
        }
        if (!normalized) {
          select.value = '';
          updateSelectPlaceholderStyle_(select);
          return;
        }

        var hasValue = Array.prototype.slice.call(select.options || []).some(function (option) {
          return String(option.value || '') === normalized;
        });

        if (!hasValue) {
          var option = document.createElement('option');
          option.value = normalized;
          option.textContent = normalized;
          select.appendChild(option);
        }

        select.value = normalized;
        updateSelectPlaceholderStyle_(select);
      }

      function setTableLoading_(isLoading) {

      function bindFilterFieldPlaceholderStyle_(field) {
        if (!field || field.dataset.placeholderFieldBound === '1') {
          return;
        }
        ['change', 'input'].forEach(function (eventName) {
          field.addEventListener(eventName, function () {

      function updateFilterFieldPlaceholderStyle_(field) {
        if (!field) {
          return;
        }
        var placeholderValue = String(field.dataset.placeholderValue || '');
        var currentValue = String(field.value || '');
        if (currentValue === placeholderValue) {

      function renderTable_(items) {
        var tbody = document.getElementById('inspectionsRows');
        tbody.innerHTML = '';

       var sortedItems = sortItems_(items);

        sortedItems.forEach(function (item) {
          var tr = document.createElement('tr');

          appendCell_(tr, String(item.idInspecao || ''), 'cell-center');
          appendCell_(tr, item.dataServidorLabel || '-', 'cell-center');

          appendCell_(tr, item.cliente || '-', 'cell-center cliente-col', item.cliente || '-');
          appendCell_(tr, String(item.qtddRevisada || 0), 'cell-center');

          appendCell_(tr, (item.operadores || []).join(', ') || '-', 'cell-left operadores-col');

          var retrabalhoCell = document.createElement('td');
          retrabalhoCell.className = 'cell-center';

          tag.className = 'pill ' + (item.retrabalho ? 'warning' : 'ok');
          tag.textContent = item.retrabalho ? 'Sim' : 'Não';
          retrabalhoCell.appendChild(tag);
          tr.appendChild(retrabalhoCell);

          var actionCell = document.createElement('td');
          actionCell.className = 'table-actions cell-center';

          detailsBtn.type = 'button';
          detailsBtn.className = 'secondary';

            openDetailsModal_(item);
          });
          actionCell.appendChild(detailsBtn);
          tr.appendChild(actionCell);

          tbody.appendChild(tr);
        });
      }

      function appendCell_(tr, value, className, titleValue) {
        var td = document.createElement('td');
        if (className) {
          td.className = className;
        }
        td.textContent = value;
        var normalizedTitle = String(typeof titleValue !== 'undefined' ? titleValue : value || '').trim();
        if (normalizedTitle) {
          td.title = normalizedTitle;
        }
        tr.appendChild(td);
      }

      function sortItems_(items) {
        var sort = listState.sort || {};
        if (!sort.key) {
          return (items || []).slice();
        }

        var sorted = (items || []).slice();
        var directionFactor = sort.direction === 'desc' ? -1 : 1;

        sorted.sort(function (a, b) {
          var left = getComparableValue_(a, sort.key, sort.type);
          var right = getComparableValue_(b, sort.key, sort.type);

          if (sort.type === 'alpha') {
            return left.localeCompare(right, 'pt-BR', { numeric: true, sensitivity: 'base' }) * directionFactor;
          }

          if (left < right) {
            return -1 * directionFactor;
          }
          if (left > right) {
            return 1 * directionFactor;
          }
          return 0;
        });

        return sorted;
      }

      function getComparableValue_(item, key, type) {
        if (key === 'operadores') {
          var operadores = (item && Array.isArray(item.operadores) ? item.operadores : []).join(', ');
          return String(operadores || '').toLowerCase();
        }

        if (type === 'numeric') {
          return Number(item && item[key]) || 0;
        }

        if (type === 'date') {
          var dateValue = item && (item[key] || item.dataServidor);
          var stamp = new Date(dateValue).getTime();
          return isNaN(stamp) ? 0 : stamp;
        }

        if (type === 'boolean') {
          return item && item[key] ? 1 : 0;
        }

        return String(item && item[key] || '')
          .toLowerCase()
          .trim();
      }

      function updateSortIndicators_() {
        Array.prototype.slice.call(document.querySelectorAll('#inspectionsTable th[data-sort-key]')).forEach(function (header) {
          var sortKey = String(header.getAttribute('data-sort-key') || '');
          var indicator = header.querySelector('.sort-indicator');
          if (!indicator) {
            return;
          }

          if (listState.sort.key === sortKey) {
            indicator.textContent = listState.sort.direction === 'asc' ? '▲' : '▼';
            header.setAttribute('aria-sort', listState.sort.direction === 'asc' ? 'ascending' : 'descending');
          } else {
            indicator.textContent = '';
            header.removeAttribute('aria-sort');
          }
        });
      }

      function updatePagination_() {
        var info = document.getElementById('paginationInfo');
        var pageInfo = document.getElementById('pageInfo');
        var prevPageBtn = document.getElementById('prevPageBtn');
        var nextPageBtn = document.getElementById('nextPageBtn');
        info.textContent = 'Total: ' + listState.total;
        pageInfo.textContent = 'Página ' + listState.page + ' de ' + listState.totalPages;

        if (listState.totalPages <= 1) {
          prevPageBtn.style.display = 'none';
          nextPageBtn.style.display = 'none';
        } else {
          prevPageBtn.style.display = '';
          nextPageBtn.style.display = '';
        }

        prevPageBtn.disabled = listState.page <= 1;
        nextPageBtn.disabled = listState.page >= listState.totalPages;
        updateAggregates_(listState.aggregates);
      }

      function updateAggregates_(aggregates) {
        var info = document.getElementById('aggregatesInfo');
        var totals = aggregates && typeof aggregates === 'object' ? aggregates : { revisados: 0, defeitos: 0 };

        var retrabalhoPct = totals.revisados > 0 ? (totals.defeitos / totals.revisados) * 100 : 0;
        info.textContent = 'Revisados: ' + formatNumber_(totals.revisados) +
          ' | Defeitos: ' + formatNumber_(totals.defeitos) +
          ' | Retrabalho: ' + formatPercent_(retrabalhoPct);
      }

      function formatNumber_(value) {
        return new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 }).format(Number(value) || 0);
      }

      function formatPercent_(value) {
        return new Intl.NumberFormat('pt-BR', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format(Number(value) || 0) + '%';
      }

      function openDetailsModal_(item) {
        if (!item) {
          return;
        }

        currentDetailsItem = item;

        document.getElementById('detailsDate').textContent = item.dataServidorLabel || '-';
        document.getElementById('detailsOp').textContent = item.op || '-';
        document.getElementById('detailsCliente').textContent = item.cliente || '-';
        document.getElementById('detailsOrigem').textContent = item.origem || '-';
        document.getElementById('detailsRetrabalho').textContent = item.retrabalho ? 'Sim' : 'Não';
        document.getElementById('detailsOperators').textContent = 'Operadores: ' + ((item.operadores || []).join(', ') || '-');

        var detailsRows = document.getElementById('detailsDefectsRows');
        var fallback = document.getElementById('detailsFallback');
        detailsRows.innerHTML = '';
        fallback.textContent = '';

        var parsed = parseDefectsPayload_(item.defeitosJsonRaw);

          parsed.forEach(function (defect, idx) {

            var tr = document.createElement('tr');

            detailsRows.appendChild(tr);
          });
        } else {
          var tr = document.createElement('tr');
          var emptyCell = document.createElement('td');
          emptyCell.colSpan = 4;
          emptyCell.textContent = 'Sem defeitos detalhados no JSON.';
          tr.appendChild(emptyCell);
          detailsRows.appendChild(tr);

          if (item.defeitosResumo) {
            fallback.textContent = 'Resumo: ' + item.defeitosResumo;
          }
        }

        document.getElementById('detailsModal').classList.remove('hidden');
      }

     function parseDefectsPayload_(raw) {
        var normalized = String(raw || '').trim();
        if (!normalized) {
          return [];
        }

        try {
          var parsed = JSON.parse(normalized);
          if (Array.isArray(parsed)) {
            return parsed;
          }
          return [];
        } catch (error) {
          return [];
        }
      }

      function tryAutoFillEditClientByOp_() {
        var opField = document.getElementById('editOp');
        var clientField = document.getElementById('editCliente');
        var normalizedOp = String(opField.value || '').trim();
        var autoOnlyMode = isEditClientAutoOnlyMode_();
        if (editState.opLocked) {
          return;
        }

        if (!normalizedOp) {
          clientField.value = '';
          clientField.readOnly = autoOnlyMode;
          clearEditOpLookupState_();
          return;
        }

        if (!window.google || !google.script || !google.script.run) {
          clientField.value = '';
          clientField.readOnly = autoOnlyMode ? true : false;
          return;
        }

        google.script.run
          .withSuccessHandler(function (cliente) {
            if (String(opField.value || '').trim() !== normalizedOp) {
              return;
            }
            var normalizedClient = String(cliente || '').trim();
            clientField.value = normalizedClient;
            clientField.readOnly = autoOnlyMode || !!normalizedClient;
            if (!normalizedClient) {
              setEditOpLookupNotFoundState_(normalizedOp);
              return;
            }
            clearEditOpLookupState_();
          })
          .withFailureHandler(function () {
            clientField.value = '';
            clientField.readOnly = autoOnlyMode ? true : false;

          .getClientByOP(normalizedOp);

      function renderEditDefectsForPosition_(selectDef, posicao) {
        var previousDefect = String(selectDef.value || '');
        var defectMap = editCatalogs.defeitosPorPosicao || {};
        var defects = defectMap[posicao] || [];
        selectDef.innerHTML = '';
        appendPlaceholderOption_(selectDef);

        defects.forEach(function (def) {
          var opt = document.createElement('option');
          opt.value = def;
          opt.textContent = def;
          selectDef.appendChild(opt);
        });

        selectDef.disabled = !posicao;
        if (previousDefect && defects.indexOf(previousDefect) !== -1) {
          selectDef.value = previousDefect;

        selectPos.className = 'posicao';

        (editCatalogs.posicoes || []).forEach(function (posicao) {
          var opt = document.createElement('option');
          opt.value = posicao;
          opt.textContent = posicao;
          selectPos.appendChild(opt);
        });
        tdPos.appendChild(selectPos);

        var tdDef = document.createElement('td');
        var selectDef = document.createElement('select');
        selectDef.className = 'defeito';
        bindSelectPlaceholderStyle_(selectDef);
        tdDef.appendChild(selectDef);

        var tdQtd = document.createElement('td');
        var inputQtd = document.createElement('input');
        inputQtd.type = 'number';
        inputQtd.className = 'quantidade';
        inputQtd.min = '1';
        inputQtd.step = '1';
        tdQtd.appendChild(inputQtd);

        var tdAction = document.createElement('td');
        var removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'row-remove';
        removeBtn.textContent = 'Remover';
        removeBtn.addEventListener('click', function () {
          tr.remove();
          if (!document.querySelectorAll('#editDefectRows tr').length) {
            addEditDefectRow_();
          }
        });
        tdAction.appendChild(removeBtn);

        selectPos.addEventListener('change', function () {
          renderEditDefectsForPosition_(selectDef, selectPos.value);
        });

        tr.appendChild(tdPos);
        tr.appendChild(tdDef);
        tr.appendChild(tdQtd);
        tr.appendChild(tdAction);
        tbody.appendChild(tr);

        renderEditDefectsForPosition_(selectDef, item && item.posicao ? String(item.posicao) : '');
        selectPos.value = item && item.posicao ? String(item.posicao) : '';
        updateSelectPlaceholderStyle_(selectPos);
        if (item && item.defeito) {
          selectDef.value = String(item.defeito);
        }
        updateSelectPlaceholderStyle_(selectDef);
        inputQtd.value = item && item.quantidade ? Number(item.quantidade) : '';
      }

      function renderEditDefectRows_(items) {
        var tbody = document.getElementById('editDefectRows');
        tbody.innerHTML = '';

        if (!items || !items.length) {
          addEditDefectRow_();
          return;
        }

        items.forEach(function (item) {
          addEditDefectRow_(item);
        });
      }

      function collectEditDefects_() {
        return Array.prototype.slice.call(document.querySelectorAll('#editDefectRows tr')).map(function (tr) {
          var qtyInput = tr.querySelector('.quantidade');
          return {
            posicao: String((tr.querySelector('.posicao') || {}).value || '').trim(),
            defeito: String((tr.querySelector('.defeito') || {}).value || '').trim(),
            quantidade: String((qtyInput && qtyInput.value) || '').trim()
          };
        }).filter(function (item) {
          return item.posicao || item.defeito || item.quantidade;
        });
      }

      function toDatetimeLocalValue_(isoValue) {
        if (!isoValue) {
          return '';
        }
        var date = new Date(isoValue);
        if (isNaN(date.getTime())) {
          return '';
        }

        var year = date.getFullYear();
        var month = String(date.getMonth() + 1).padStart(2, '0');
        var day = String(date.getDate()).padStart(2, '0');
        var hour = String(date.getHours()).padStart(2, '0');
        var minute = String(date.getMinutes()).padStart(2, '0');
        return year + '-' + month + '-' + day + 'T' + hour + ':' + minute;
      }

      function closeEditModal_() {
        document.getElementById('editDetailsModal').classList.add('hidden');
      }

      function collectNormalizedEditOperators_() {
        var selectedMap = {};

        for (var i = 1; i <= 8; i += 1) {
          var select = document.getElementById('editOperador' + i);
          if (!select || !select.value) {
            continue;
          }

          var value = String(select.value || '').trim();
          if (!value || selectedMap[value]) {
            continue;
          }

          selectedMap[value] = true;
        }

        var normalized = Object.keys(selectedMap);
        while (normalized.length < 8) {
          normalized.push('');
        }

        return normalized.slice(0, 8);
      }

      function submitEditDetails_(event) {
        event.preventDefault();

        if (!currentDetailsItem) {
          setMessage_('Selecione um registro para editar.', 'error');
          return;
        }

        if (!window.google || !google.script || !google.script.run) {
          setMessage_('Ambiente do Apps Script indisponível para editar inspeções.', 'error');
          return;
        }

        var payloadValidationError = validateEditPayload_();
        if (payloadValidationError) {
          setMessage_(payloadValidationError, 'error');
          return;
        }

        var editDefects = collectEditDefects_();
        var defectsJsonRaw = editDefects.length ? JSON.stringify(editDefects) : '';
        var defectsSummary = editDefects.map(function (defect) {
          return [defect.posicao, defect.defeito, defect.quantidade].join(' / ');
        }).join(' | ');

        document.getElementById('editTotalLancamentos').value = editDefects.length;
        document.getElementById('editDefeitosJson').value = defectsJsonRaw;
        document.getElementById('editDefeitosResumo').value = defectsSummary;

        var payload = {
          idInspecao: currentDetailsItem.idInspecao,
          sheetRowNumber: currentDetailsItem.sheetRowNumber,
          dataServidor: String(document.getElementById('editDataServidor').value || '').trim(),
          op: editState.opLocked ? '' : String(document.getElementById('editOp').value || '').trim(),
          qtddRevisada: Number(document.getElementById('editQtddRevisada').value || 0),
          origem: String(document.getElementById('editOrigem').value || '').trim(),
          cliente: String(document.getElementById('editCliente').value || '').trim(),
          criadoPorEmail: String(currentDetailsItem.criadoPorEmail || '').trim(),
          operadores: collectNormalizedEditOperators_(),
          totalLancamentosDefeitos: Number(document.getElementById('editTotalLancamentos').value || 0),
          defeitosJsonRaw: String(document.getElementById('editDefeitosJson').value || '').trim(),
          defeitosResumo: String(document.getElementById('editDefeitosResumo').value || '').trim(),
          retrabalho: String(document.getElementById('editRetrabalho').value || 'nao').trim() === 'sim'
        };

        setMessage_('Salvando edição da inspeção...', 'info');
       setEditSavingOverlay_(true);
        google.script.run
          .withSuccessHandler(function () {
            setEditSavingOverlay_(false);
            closeEditModal_();
            closeDetailsModal_();
            loadInspections_();
            setMessage_('Inspeção atualizada com sucesso.', 'success', true);
          })
          .withFailureHandler(function (error) {
            setEditSavingOverlay_(false);
            setMessage_('Falha ao editar inspeção: ' + (error.message || error), 'error');
          })
          .updateInspectionControl(payload);
      }

      function setEditSavingOverlay_(loading) {
        var overlay = document.getElementById('editSavingOverlay');
        if (!overlay) {
          return;
        }
        if (loading) {
          overlay.classList.remove('hidden');
          return;
        }
        overlay.classList.add('hidden');
      }

      document.getElementById('addEditDefectBtn').addEventListener('click', function () {
        addEditDefectRow_();
      });

 function sanitizeEditOpInput_() {
        if (editState.opLocked) {
          return;
        }
        var opField = document.getElementById('editOp');
        opField.value = String(opField.value || '').replace(/\D/g, '');
        clearEditOpLookupState_();
      }

      function applyEditOpLockState_(locked, preserveClient) {
        var opField = document.getElementById('editOp');
        var clientField = document.getElementById('editCliente');
        var lockBtn = document.getElementById('editOpLockBtn');
        var opRequired = !!editCatalogs.opObrigatoria;
        editState.opLocked = opRequired ? false : !!locked;

        opField.readOnly = editState.opLocked;
        opField.required = true;
        if (editState.opLocked) {
          opField.value = OP_EMPTY_LABEL;
        } else if (!preserveClient) {
          opField.value = '';
        }
        clientField.readOnly = isEditClientAutoOnlyMode_();

        if (!preserveClient && editState.opLocked) {
          clientField.value = '';
        } else if (!preserveClient && !editState.opLocked) {
          clientField.value = '';
        }
        clearEditOpLookupState_();

        lockBtn.classList.toggle('locked', editState.opLocked);
        lockBtn.style.display = opRequired ? 'none' : '';
        syncEditRequiredIndicators_();
      }

      function syncEditRequiredIndicators_() {
        var opLabel = document.getElementById('editOpLabel');
        var clientLabel = document.getElementById('editClienteLabel');
        var origemLabel = document.getElementById('editOrigemLabel');
        var qtdLabel = document.getElementById('editQtddLabel');
        var origemSelect = document.getElementById('editOrigem');
        var clienteInput = document.getElementById('editCliente');
        var qtdInput = document.getElementById('editQtddRevisada');

        opLabel.textContent = editState.opLocked ? 'OP' : 'OP *';
        clientLabel.textContent = editState.opLocked ? 'Cliente *' : 'Cliente';
        qtdLabel.textContent = 'Quantidade revisada *';
        origemLabel.textContent = editCatalogs.origemObrigatoria ? 'Origem *' : 'Origem';
        clienteInput.required = editState.opLocked;
        qtdInput.required = true;
        origemSelect.required = !!editCatalogs.origemObrigatoria;
      }

      function validateEditPayload_() {
        var opValue = String(document.getElementById('editOp').value || '').trim();
        var clienteValue = String(document.getElementById('editCliente').value || '').trim();
        var qtdValue = Number(document.getElementById('editQtddRevisada').value || 0);
        var origemValue = String(document.getElementById('editOrigem').value || '').trim();

        if (!editState.opLocked) {
          if (!opValue) {
            return 'OP é obrigatória.';
          }
          if (!/^\d+$/.test(opValue)) {
            return 'OP deve conter apenas dígitos numéricos.';
          }
          if (isEditOpLookupInvalidForSave_()) {
            return 'OP ' + opValue + ' não foi encontrada na aba op_cliente.';
          }
        }

        if (editCatalogs.opObrigatoria && !opValue) {
          return 'OP é obrigatória.';
        }

        if (editState.opLocked && !clienteValue) {
          return 'Cliente é obrigatório quando marcado como Sem OP.';
        }

        if (!qtdValue || qtdValue <= 0) {
          return 'Qtdd revisada deve ser maior que zero.';
        }

        if (editCatalogs.origemObrigatoria && !origemValue) {
          return 'Origem é obrigatória.';
        }

        return '';
      }

      function setEditOpLookupNotFoundState_(op) {
        var opField = document.getElementById('editOp');
        opField.classList.add('op-not-found');
        editState.opLookup.notFound = true;
        editState.opLookup.op = String(op || '').trim();
        editState.opLookup.message = 'OP ' + editState.opLookup.op + ' não foi encontrada na aba op_cliente.';
        renderEditOpLookupMessage_();
      }

      function clearEditOpLookupState_() {
        var opField = document.getElementById('editOp');
        if (opField) {
          opField.classList.remove('op-not-found');
        }
        clearEditOpLookupMessage_();
        editState.opLookup.notFound = false;
        editState.opLookup.op = '';
        editState.opLookup.message = '';
      }

      function clearEditOpLookupMessage_() {
        var box = document.getElementById('editOpLookupMessage');
        if (!box || !editState.opLookup.message) {
          return;
        }
        box.textContent = '';
      }

      function renderEditOpLookupMessage_() {
        var box = document.getElementById('editOpLookupMessage');
        if (!box) {
          return;
        }
        box.textContent = editState.opLookup.message || '';
      }

      function isEditOpLookupInvalidForSave_() {
        if (editState.opLocked) {
          return false;
        }
        var opValue = String(document.getElementById('editOp').value || '').trim();
        if (!opValue) {
          return false;
        }
        return editState.opLookup.notFound && editState.opLookup.op === opValue;
      }

      function isEditClientAutoOnlyMode_() {
        return !editState.opLocked;
      }

      function showInlineStatus_(elementId, text) {
        var target = document.getElementById(elementId);
        if (!target) {
          return;
        }

        target.textContent = text || '';
      }

      function navigateToMainPage_(url) {
        try {
          window.top.location.href = url;
        } catch (error) {
          window.location.href = url;
        }
      }

      function showNavigationLoading_() {
        var overlay = document.getElementById('navigationLoadingOverlay');
        if (!overlay) {
          return;
        }
        overlay.classList.remove('hidden');
      }

      function goBack_() {
        showNavigationLoading_();
        markSkipSplashOnce_();
        navigateToMainPage_(buildHomeUrlWithoutSplash_());
      }

      function markSkipSplashOnce_() {
        try {
          window.sessionStorage.setItem('cqexp.skipSplashOnce', '1');
        } catch (error) {}
      }

      function buildHomeUrlWithoutSplash_() {
        var baseUrl = String(window.APP_BASE_URL || '').trim();
        var homeUrl = '';

        if (baseUrl) {
          homeUrl = baseUrl + '?page=index';
        } else {
          var fallbackUrl = new URL(window.location.href);
          fallbackUrl.searchParams.set('page', 'index');
          homeUrl = fallbackUrl.toString();
        }

        var url = new URL(homeUrl, window.location.origin);
        url.searchParams.set('nosplash', '1');
        return url.toString();
      }

      function setMessage_(text, type, autoClear) {
        var messageBox = document.getElementById('messageBox');
        messageBox.textContent = text || '';
        messageBox.className = 'message' + (type ? ' ' + type : '');

        if (autoClear) {
          window.setTimeout(function () {
            if (messageBox.textContent === text) {
              messageBox.textContent = '';
              messageBox.className = 'message';
            }
          }, 3500);
        }
      }
    </script>
  </body>
</html>
